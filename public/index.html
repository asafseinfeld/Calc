<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Calculator</title>
<style>
  body {
    font-family: sans-serif;
    background: #1e1e2f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .calculator {
    background: #2b2b3d;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    width: 280px;
  }
  #display {
    width: 100%;
    height: 60px;
    font-size: 28px;
    text-align: right;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    margin-bottom: 15px;
    padding: 0 15px;
    box-sizing: border-box;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button {
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #3d3d55;
    color: #fff;
    cursor: pointer;
  }
  button.operator { background: #ff9f43; }
  button.equals { background: #2ecc71; grid-column: span 2; }
  button.clear { background: #e74c3c; }
</style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" disabled>
  <div class="buttons">
    <button class="clear" id="btn-clear">C</button>
    <button id="btn-del">DEL</button>
    <button class="operator" data-val="%">%</button>
    <button class="operator" data-val="/">÷</button>

    <button class="num" data-val="7">7</button>
    <button class="num" data-val="8">8</button>
    <button class="num" data-val="9">9</button>
    <button class="operator" data-val="*">×</button>
