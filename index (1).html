<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Calculator</title>
<style>
body{font-family:sans-serif;background:#1e1e2f;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.calculator{background:#2b2b3d;border-radius:12px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.5);width:300px;}
#display{width:100%;height:60px;font-size:28px;text-align:right;background:#111;color:#fff;border:none;border-radius:8px;margin-bottom:15px;padding:0 15px;box-sizing:border-box;}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
button{padding:18px 0;font-size:18px;border:none;border-radius:8px;background:#3d3d55;color:#fff;cursor:pointer;}
button:hover{background:#52527a;}
button.operator{background:#ff9f43;}
button.operator:hover{background:#ffb26b;}
button.equals{background:#2ecc71;grid-column:span 2;}
button.equals:hover{background:#4bdf8b;}
button.clear{background:#e74c3c;}
button.clear:hover{background:#ff6b5b;}
</style>
</head>
<body>
<div class="calculator">
<input type="text" id="display" disabled>
<div class="buttons">
<button class="clear" id="btn-clear">C</button>
<button id="btn-del">DEL</button>
<button class="operator" data-val="%">%</button>
<button class="operator" data-val="/">÷</button>
<button class="num" data-val="7">7</button>
<button class="num" data-val="8">8</button>
<button class="num" data-val="9">9</button>
<button class="operator" data-val="*">×</button>
<button class="num" data-val="4">4</button>
<button class="num" data-val="5">5</button>
<button class="num" data-val="6">6</button>
<button class="operator" data-val="-">−</button>
<button class="num" data-val="1">1</button>
<button class="num" data-val="2">2</button>
<button class="num" data-val="3">3</button>
<button class="operator" data-val="+">+</button>
<button class="num" data-val="0">0</button>
<button class="num" data-val=".">.</button>
<button class="equals" id="btn-equals">=</button>
</div>
</div>
<script>
var display = document.getElementById('display');
document.querySelectorAll('.num, .operator').forEach(function(btn){
  btn.addEventListener('click', function(){ display.value += btn.getAttribute('data-val'); });
});
document.getElementById('btn-clear').addEventListener('click', function(){ display.value = ''; });
document.getElementById('btn-del').addEventListener('click', function(){ display.value = display.value.slice(0,-1); });
document.getElementById('btn-equals').addEventListener('click', function(){
  try{
    if(/^[0-9+\-*/.%\s]*$/.test(display.value) && display.value.trim() !== ''){
      display.value = Function('"use strict";return (' + display.value + ')')();
    } else { display.value = 'Error'; }
  }catch(e){ display.value = 'Error'; }
});
document.addEventListener('keydown', function(e){
  if(/[0-9+\-*/.%]/.test(e.key)){ display.value += e.key; }
  else if(e.key === 'Enter'){ document.getElementById('btn-equals').click(); }
  else if(e.key === 'Backspace'){ display.value = display.value.slice(0,-1); }
  else if(e.key === 'Escape'){ display.value = ''; }
});
</script>
</body>
</html>
